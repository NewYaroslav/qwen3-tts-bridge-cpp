[tool.ruff]
line-length = 88
target-version = "py311"
src = ["worker/src", "worker/packaging", "tests/python"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.pyright]
include = ["worker/src", "worker/packaging", "tests/python"]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[[tool.pyright.executionEnvironments]]
root = "."
extraPaths = ["worker/src"]
