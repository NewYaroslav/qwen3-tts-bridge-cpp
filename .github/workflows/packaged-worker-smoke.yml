name: Packaged Worker Smoke

on:
  workflow_dispatch:
    inputs:
      mock_chunks:
        description: Number of mock PCM chunks to synthesize.
        required: false
        default: "1"
      timeout_seconds:
        description: Packaged worker smoke-test timeout in seconds.
        required: false
        default: "30"
      upload_artifact:
        description: Upload dist/QwenTTSBridge as a workflow artifact.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: packaged-worker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Nuitka mock worker
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements-packaging.lock.txt

      - name: Install packaging tooling
        shell: pwsh
        run: .\scripts\setup-python-packaging.ps1 -Python python

      - name: Build standalone worker
        shell: pwsh
        run: >
          .\scripts\package-worker.ps1
          -Python python
          -Clean
          -AssumeYesForDownloads

      - name: Smoke-test packaged worker
        shell: pwsh
        run: >
          .\scripts\test-packaged-worker.ps1
          -Python python
          -TimeoutSeconds ${{ inputs.timeout_seconds }}
          -MockChunks ${{ inputs.mock_chunks }}

      - name: Upload packaged worker artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: QwenTTSBridge-worker-mock-smoke
          path: dist/QwenTTSBridge
          if-no-files-found: error
