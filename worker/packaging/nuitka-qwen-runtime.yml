- module-name: 'qwen_tts.core.models.modeling_qwen3_tts' # checksum: b07ccd1c
  anti-bloat:
    - description: 'use torchaudio mel filters instead of importing librosa filters'
      replacements_plain:
        "def _librosa_mel_fn():\n    return import_module(\"librosa.filters\").mel": "def _librosa_mel_fn():\n    def mel(sr, n_fft, n_mels=128, fmin=0.0, fmax=None, htk=False, norm=\"slaney\", dtype=None, **kwargs):\n        import torchaudio.functional as torchaudio_functional\n\n        if fmax is None:\n            fmax = sr / 2.0\n\n        mel_basis = torchaudio_functional.melscale_fbanks(\n            n_freqs=n_fft // 2 + 1,\n            f_min=fmin,\n            f_max=fmax,\n            n_mels=n_mels,\n            sample_rate=sr,\n            norm=norm,\n            mel_scale=\"htk\" if htk else \"slaney\",\n        ).transpose(0, 1).numpy()\n\n        if dtype is not None:\n            return mel_basis.astype(dtype, copy=False)\n\n        return mel_basis\n\n    return mel"

